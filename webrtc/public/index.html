<!DOCTYPE html>
<html>
<head>
    <title>P2P Intercom</title>
    <style>
        body { background: #222; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        video { width: 45%; border: 2px solid #555; margin: 10px; background: #000; }
        .video-container { display: flex; justify-content: center; width: 100%; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Secure Video Link</h2>
    <div class="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <button id="callButton">Start Call</button>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
