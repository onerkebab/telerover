<!DOCTYPE html>
<html>
<head>
    <title>Telerover v1</title>
    <style>
        body { background: #222; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        video { width: 95%; border: 2px solid #555; margin: 10px; background: #000; }
        .video-container { display: flex; justify-content: center; width: 100%; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .small {position: absolute; bottom:20px; right:20px; width: 200px; border: 2px solid #aaa; background: #000; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Secure Video Link</h2>
    <div class="video-container">
        <video id="localVideo" autoplay muted playsinline class="small"></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <button id="callButton">Start Call</button>
    <button id="toggleBtn">Hide My Camera</button>  

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
